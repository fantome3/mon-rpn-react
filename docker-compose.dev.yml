services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: monrpn-client
    volumes:
      - ./client:/app 
      - /app/node_modules 
    ports:
      - '5173:5173'
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev 
    container_name: monrpn-server
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - '5010:5010'
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - PORT=5010
    restart: unless-stopped
