version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: acq-rpn-server
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - PORT=5010
    ports:
      - '5010:5010'
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: acq-rpn-client
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - '80:80'
    depends_on:
      - server
    restart: unless-stopped
